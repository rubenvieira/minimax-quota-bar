name: MiniMaxQuotaBar
options:
  bundleIdPrefix: com.minimax
  deploymentTarget:
    macOS: "13.0"

settings:
  base:
    SWIFT_VERSION: "5.9"
    MACOSX_DEPLOYMENT_TARGET: "13.0"
    CODE_SIGN_IDENTITY: "-"
    CODE_SIGNING_REQUIRED: "NO"

targets:
  MiniMaxQuotaBar:
    type: application
    platform: macOS
    sources:
      - path: MiniMaxQuotaBarApp.swift
      - path: Assets.xcassets
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.minimax.quota-bar
        PRODUCT_NAME: MiniMaxQuotaBar
        MARKETING_VERSION: "1.2.2"
        CURRENT_PROJECT_VERSION: "4"
        INFOPLIST_KEY_LSUIElement: YES
        INFOPLIST_KEY_CFBundleDisplayName: "MiniMax Quota"
        GENERATE_INFOPLIST_FILE: YES
        ENABLE_HARDENED_RUNTIME: NO
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
    info:
      path: Info.plist
      properties:
        CFBundleIconFile: ""
        CFBundleIconName: AppIcon
        CFBundleShortVersionString: "1.2.2"
        CFBundleVersion: "4"
