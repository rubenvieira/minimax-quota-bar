<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <defs>
    <linearGradient id="grad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#4F46E5"/>
      <stop offset="100%" style="stop-color:#7C3AED"/>
    </linearGradient>
  </defs>
  
  <!-- Background circle -->
  <circle cx="256" cy="256" r="240" fill="url(#grad)"/>
  
  <!-- Progress bar background -->
  <rect x="86" y="200" width="340" height="60" rx="30" fill="rgba(255,255,255,0.3)"/>
  
  <!-- Progress bar fill -->
  <rect x="86" y="200" width="204" height="60" rx="30" fill="white"/>
  
  <!-- M letter -->
  <text x="256" y="340" font-family="Arial, sans-serif" font-size="100" font-weight="bold" fill="white" text-anchor="middle">M</text>
  
  <!-- Small percentage indicator -->
  <circle cx="380" cy="140" r="50" fill="#10B981"/>
  <text x="380" y="158" font-family="Arial, sans-serif" font-size="36" font-weight="bold" fill="white" text-anchor="middle">%</text>
</svg>
